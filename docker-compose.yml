services:
  postgres:
    image: postgres:16
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      TZ: ${TZ}
      PGTZ: ${TZ}
    volumes:
      - ./services/postgres/data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrator:
    image: postgres:16
    container_name: sentinel-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PG_DB}
      PGUSER: ${PG_USER}
      PGPASSWORD: ${PG_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./services/postgres/migrations:/migrations:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        for f in /migrations/*.sql; do
          echo "[migrator] applying $$f"
          psql -v ON_ERROR_STOP=1 -f "$$f"
        done
        echo "[migrator] done"

  redis:
    image: redis:7
    container_name: sentinel-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  suricata:
    image: jasonish/suricata:latest
    container_name: sentinel-suricata
    restart: unless-stopped
    network_mode: host
    command:
      - suricata
      - -i
      - ${SURICATA_INTERFACE}
      - -l
      - /var/log/suricata
    volumes:
      - ./services/suricata/logs:/var/log/suricata

  suricata-ingester:
    build: ./services/workers
    container_name: sentinel-suricata-ingester
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      suricata:
        condition: service_started
    command: ["python", "/app/suricata_ingester.py"]
    environment:
      TZ: ${TZ}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY}
      REDIS_STREAM_MAXLEN: ${REDIS_STREAM_MAXLEN}
      SURICATA_EVE_FILE: /logs/eve.json
      INGEST_POLL_INTERVAL: ${INGEST_POLL_INTERVAL}
    volumes:
      - ./services/suricata/logs:/logs

  suricata-worker:
    build: ./services/workers
    container_name: sentinel-suricata-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: ["python", "/app/suricata_worker.py"]
    environment:
      TZ: ${TZ}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY}
      REDIS_GROUP_NAME: ${REDIS_GROUP_NAME}
      REDIS_CONSUMER_NAME: ${REDIS_CONSUMER_NAME}
      REDIS_READ_COUNT: ${REDIS_READ_COUNT}
      REDIS_BLOCK_MS: ${REDIS_BLOCK_MS}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}

  syslog-ingester:
    build: ./services/workers
    container_name: sentinel-syslog-ingester
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "/app/syslog_ingester.py"]
    environment:
      TZ: ${TZ}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_STREAM_KEY: ${SYSLOG_STREAM_KEY}
      REDIS_STREAM_MAXLEN: ${REDIS_STREAM_MAXLEN}
      SYSLOG_BIND_HOST: ${SYSLOG_BIND_HOST}
      SYSLOG_UDP_PORT: ${SYSLOG_UDP_PORT}
      SYSLOG_TCP_PORT: ${SYSLOG_TCP_PORT}
      SYSLOG_DEFAULT_HOSTNAME: ${SYSLOG_DEFAULT_HOSTNAME}
    ports:
      - "${SYSLOG_UDP_PORT}:${SYSLOG_UDP_PORT}/udp"
      - "${SYSLOG_TCP_PORT}:${SYSLOG_TCP_PORT}/tcp"

  syslog-worker:
    build: ./services/workers
    container_name: sentinel-syslog-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: ["python", "/app/syslog_worker.py"]
    environment:
      TZ: ${TZ}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_STREAM_KEY: ${SYSLOG_STREAM_KEY}
      REDIS_GROUP_NAME: ${SYSLOG_GROUP_NAME}
      REDIS_CONSUMER_NAME: ${SYSLOG_CONSUMER_NAME}
      REDIS_READ_COUNT: ${REDIS_READ_COUNT}
      REDIS_BLOCK_MS: ${REDIS_BLOCK_MS}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}

  partition-manager:
    build: ./services/workers
    container_name: sentinel-partition-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: ["python", "/app/partition_manager.py"]
    environment:
      TZ: ${TZ}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PARTITION_LOOKAHEAD_MONTHS: ${PARTITION_LOOKAHEAD_MONTHS}
      PARTITION_CHECK_INTERVAL_SECONDS: ${PARTITION_CHECK_INTERVAL_SECONDS}

  alert-worker:
    build: ./services/workers
    container_name: sentinel-alert-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: ["python", "/app/alert_worker.py"]
    environment:
      TZ: ${TZ}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      ALERT_POLL_INTERVAL_SECONDS: ${ALERT_POLL_INTERVAL_SECONDS}
      ALERT_LOOKBACK_MINUTES: ${ALERT_LOOKBACK_MINUTES}
      SSH_BRUTEFORCE_WINDOW_MINUTES: ${SSH_BRUTEFORCE_WINDOW_MINUTES}
      SSH_BRUTEFORCE_THRESHOLD: ${SSH_BRUTEFORCE_THRESHOLD}
      SURICATA_HIGH_SEVERITY_MIN: ${SURICATA_HIGH_SEVERITY_MIN}

  api:
    build: ./services/api
    container_name: sentinel-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      TZ: ${TZ}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
    ports:
      - "8000:8000"

  frontend:
    build: ./services/frontend
    container_name: sentinel-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

networks:
  default:
    name: sentinel-network
